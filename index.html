<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TDY Checklist">
<link rel="manifest" href="manifest2.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<title>TDY Mission Checklist</title>
<style>
  :root {
    --cyan:        #1eb4f0;
    --cyan-dim:    rgba(30, 180, 240, 0.18);
    --cyan-border: rgba(30, 180, 240, 0.45);
    --purple:      #b060e0;
    --purple-dim:  rgba(176, 96, 224, 0.18);
 
    --bg:          #000000;
    --surface:     #101010;
    --surface2:    #1a1a1a;
    --border:      #2a2a2a;
    --border-hi:   #3a3a3a;
    --text:        #f0f0f0;
    --muted:       #888888;
    --done-text:   #444444;
 
    --radius: 10px;
    --radius-sm: 6px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }
 
  /* ── HEADER ─────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--cyan-border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 21px; font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--cyan);
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-size: 12px; font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .reset-btn:active { opacity: 0.5; }
 
  /* ── SEARCH ──────────────────────────────────────── */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 34px 9px 36px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px; font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--cyan); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute; right: 9px; top: 50%;
    transform: translateY(-50%);
    background: var(--muted); border: none;
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .search-clear.visible { opacity: 1; pointer-events: auto; }
  .search-clear svg { width: 10px; height: 10px; color: white; }
 
  /* ── PROGRESS ────────────────────────────────────── */
  .progress-stats {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 5px;
  }
  .progress-track { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--cyan); border-radius: 4px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 8px rgba(30,180,240,0.5);
  }
 
  /* ── SEARCH LABEL / NO RESULTS ───────────────────── */
  .search-results-label {
    display: none; font-size: 12px; font-weight: 600;
    color: var(--muted); padding: 8px 16px 0;
  }
  .search-results-label.visible { display: block; }
  .no-results {
    display: none; text-align: center;
    padding: 40px 20px; color: var(--muted); font-size: 15px;
  }
  .no-results.visible { display: block; }
 
  /* ── TABS ────────────────────────────────────────── */
  .tabs {
    display: flex; overflow-x: auto; gap: 7px;
    padding: 10px 16px 0;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs.search-active { display: none; }
  .tab {
    flex-shrink: 0;
    border: 1px solid var(--border-hi);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px; font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border-hi); transition: background 0.2s; flex-shrink: 0;
  }
  .tab.active {
    border-color: var(--cyan);
    background: var(--cyan-dim);
    color: var(--cyan);
  }
  .tab.active .tab-dot { background: var(--cyan); }
  .tab:active { transform: scale(0.96); }
 
  /* ── SECTION ─────────────────────────────────────── */
  .section { display: none; padding: 12px 16px 0; }
  .section.active { display: block; }
  .section.search-active { display: block !important; }
 
  .section-search-label {
    display: none;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--cyan); border: 1px solid var(--cyan-border);
    padding: 2px 10px; border-radius: 4px;
    margin-bottom: 6px; width: fit-content;
  }
  .section.search-active .section-search-label { display: inline-block; }
 
  /* ── GROUP HEADER ────────────────────────────────── */
  .group-header {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    padding: 14px 0 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .group-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .group-header.search-hidden { display: none !important; }
 
  /* ── CHECKLIST ───────────────────────────────────── */
  .checklist { display: flex; flex-direction: column; gap: 3px; }
  .check-item.search-hidden { display: none !important; }
 
  .check-item {
    display: flex; align-items: center; gap: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan-border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
    min-height: 52px;
  }
  .check-item:active { background: var(--surface2); }
  .check-item.done {
    border-left-color: var(--border);
    opacity: 0.45;
  }
  .check-item.done .item-label {
    text-decoration: line-through;
    color: var(--done-text);
  }
 
  /* ── CHECKBOX ────────────────────────────────────── */
  .checkbox {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1.5px solid var(--border-hi);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .check-item.done .checkbox {
    background: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 8px rgba(30,180,240,0.6);
  }
  .checkmark { display: none; width: 11px; height: 8px; }
  .checkmark path { stroke: #000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .check-item.done .checkmark { display: block; }
 
  /* ── ITEM TEXT ───────────────────────────────────── */
  .item-content { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .item-label { font-size: 16px; font-weight: 500; line-height: 1.35; color: var(--text); }
 
  /* ── NOTES ───────────────────────────────────────── */
  .item-notes {
    font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit; width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  .item-notes:focus { border-color: var(--cyan); }
  .item-notes::placeholder { color: var(--muted); }
  .check-item.done .item-notes { opacity: 0.4; }
 
  /* ── SEARCH HIGHLIGHT ────────────────────────────── */
  .search-highlight {
    background: var(--cyan);
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }
 
  /* ── BOTTOM SUMMARY ──────────────────────────────── */
  .phase-summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--cyan-border);
    padding: 10px 20px 26px;
    display: flex; justify-content: space-around;
  }
  .phase-stat { text-align: center; }
  .phase-stat .ps-num { font-size: 22px; font-weight: 800; }
  .phase-stat .ps-label {
    font-size: 10px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-top: 2px;
  }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-top">
    <h1>TDY Checklist</h1>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
    </svg>
    <input type="search" class="search-input" id="search-input"
      placeholder="Search checklist…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Clear search">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 2l6 6M8 2l-6 6"/>
      </svg>
    </button>
  </div>
  <div class="progress-stats">
    <span id="prog-label">0 of 0 complete</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
 
<div class="tabs" id="tabs-nav"></div>
 
<div class="search-results-label" id="search-results-label"></div>
<div class="no-results" id="no-results">No items match your search.</div>
 
<div id="sections-wrap"></div>
<div class="phase-summary" id="phase-summary"></div>
 
<script>
const SECTIONS = [
  {
    id: 'mission-planning', label: 'Mission Planning', color: 'plan',
    groups: [
      { title: 'Mission Docs', items: [
        'G2 Mission Setup Sheet (Remarks)', '1801, Form 200', 'WX, NOTAMs, TOLD',
        'Departure Procedures (+SDP)', 'FAA International NOTAMs', 'Foreign Clearance Guide (FCG)',
        'Reporting Instructions', 'Area Planning (AP)', 'IFR Supplement',
        'ASRR / Giant Reports (TT)', 'Supp Theater Info File (STIF)',
        'CMD / Mission Spins (CP print)', 'Coronet Spins (tacc.us.af.mil)',
        'Electronic Mission Folder (EMF)', 'AVANA Time confirmed', 'ALTRAV confirmed',
      ]},
      { title: 'Considerations', items: [
'Emergency Airfields reviewed', 'Operating / Quiet Hours checked',
        'Gross Weight calculated', 'Aircraft Configuration confirmed', 'Aircraft Lockbox (2 Seperate for Guns + Secrets)',
        'GSA Locks for each box', 'CDT / FDP reviewed (202v3 AMCSUP Ch 3)', 'Ground Times / Crew Rest planned',
      ]},
      { title: 'Overseas / OCONUS', items: [
        'AE Information reviewed', 'Local IFG / Arrival Guide printed',
        'Print Airfield Diagrams', 'Release Space-A Seats?',
        'Cargo / Pax Manifest (DD Form 2131)', 'Formation reviewed', 'Tactics reviewed',
        'PPR Req submitted', 'MM Channel established',
        'Guns (aircraft lock box or armory hrs)', 'Secrets / SKL (CP storage)',
        'TDY Kit / Stratus Puck / PCMIA Cards', 'Current DAFIF / Next Cycle confirmed',
        'Aero App Cycle confirmed', 'Courrier Letter (Security Mgr)',
        'Aircrew Gouge (Ops, local area, etc)', 'Crew Qualification / Currency (Tactics)',
        'Airfield Servicing Facilities / Equipment', 'Aircraft Parking / Security',
        'Customs requirements reviewed', 'LRS A, B, or C Bags packed',
        'AFE D Bags or AERPS Gear ready',
      ]},
      { title: 'Oceanic / Long Range', items: [
        'Oceanic Checklist (Goodreader)', 'Oceanic Plotting Chart',
        'Equal Time Point (ETP) calculated', 'Divert Locations identified',
        'NAT Track NOTAMs reviewed', 'DIPS checked',
        'Coord INTEL / SERE Briefings', 'HF Radios, SATCOM, CPDLC (MX verified)',
      ]},
    ]
  },
  {
    id: 'pre-departure', label: 'Pre-Departure', color: 'ops',
    groups: [
      { title: 'Crew Actions', items: [
        'TDY Group Text established', 'Crew Brief Time established',
        'FCC Contact Info distributed', 'Out-Processing Checklist complete',
        'Check MERS / Print ITS', 'DTS Authorization confirmed (per diem noted)',
        'GTC Check', 'Tax Exempt Letter', 'Lodging Reservations confirmed',
        'POV Long-term Parking arranged', 'U-Drive / Rental Car reserved',
        'Destination WX checked', 'Flight Meals / Water arranged',
      ]},
    ]
  },
  {
    id: 'day-of-flight', label: 'Day of Flight', color: 'crit',
    groups: [
      { title: 'Pre-Flight Checks', items: [
        'Review / Initial Flight Authorizations', 'Make copies of FAs',
        'NATO Orders (if req)', 'Download Crew Papers (IFM)',
        'WX, NOTAMs, TOLD (Climbout Cap)', 'Training Folders — Instructors',
        '1801 Filed with Base Ops', 'Formation Kneeboard / Coord Card',
        'Cargo / Pax Status & Timing', 'Sign FCIFs / Read Files', 'ORM completed',
      ]},
      { title: 'EFBs', items: [
        'Current EPUBs (EFB Placard)', 'Current IOS loaded', 'Battery status checked',
      ]},
      { title: 'Aircraft / Gear', items: [
        'TDY Kit / Stratus Puck / PCMIA Cards loaded', 'Secrets / SKL loaded',
        'Guns & GSA Lock secured', 'Water Jug loaded', 'Case of H2O from Pax Terminal',
      ]},
      { title: 'Mission Papers', items: [
        'ORM copy loaded', 'Form F copy loaded', '781s copy loaded',
        '791s copy loaded', 'Customs Forms (if req)', 'MARs copy loaded',
      ]},
    ]
  },
  {
    id: 'destination', label: 'Destination', color: 'ops',
    groups: [
      { title: 'On Arrival', items: [
        'Contact TACC / C2 → LFA', 'Landing Fuel confirmed',
        'Refueling Load sent to FCCs', 'Debrief with FCCs',
        '781s, 791s, MARS, Dotsheet completed', 'Custom Forms (if req)',
        'Download Cargo / Pax', 'Secrets → CP', 'Guns → Lock Box / Armory',
        'Pickup U-Drive / Rental Car', 'Lodging Front Desk check-in',
        'Rally Plan executed', 'Commissary Run', 'Charge Status Puck',
      ]},
      { title: 'Schedule Transport', items: ['Schedule Trans arranged'] },
    ]
  },
  {
    id: 'next-leg', label: 'Next Leg', color: 'plan',
    groups: [
      { title: 'Rerun TDY Checklist', items: [
        'Rerun TDY Checklist (if req)', 'Hotel Receipt (Taxes?) obtained',
        'Schedule Trans arranged', 'Return U-Drive / Rental Car',
        'Pickup Guns / Secrets', 'Shoppette Run',
      ]},
    ]
  },
  {
    id: 'rtb', label: 'RTB', color: 'plan',
    groups: [
      { title: 'Return Actions', items: [
        'Download Cargo / Pax', 'MX Debrief completed',
        'Post Mission PPW (781, 791, MARs, etc)', 'PMCR completed (202v3 AMCSUP 3.1.10.)',
        'DTS Voucher submitted', 'Close MM Channel',
        'Return Stratus, TDY Kit, Guns, Secrets',
      ]},
    ]
  },
];
 
let state = {}, notes = {};
 
function loadState() {
  try { state = JSON.parse(localStorage.getItem('tdy2_state') || '{}'); } catch(e) { state = {}; }
  try { notes = JSON.parse(localStorage.getItem('tdy2_notes') || '{}'); } catch(e) { notes = {}; }
}
function saveState() {
  localStorage.setItem('tdy2_state', JSON.stringify(state));
  localStorage.setItem('tdy2_notes', JSON.stringify(notes));
}
function itemKey(sId, gTitle, item) { return `${sId}||${gTitle}||${item}`; }
function getAllKeys() {
  const k = [];
  SECTIONS.forEach(s => s.groups.forEach(g => g.items.forEach(i => k.push(itemKey(s.id, g.title, i)))));
  return k;
}
 
function updateProgress() {
  const all = getAllKeys(), done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('prog-label').textContent = `${done} of ${all.length} complete`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
 
  document.getElementById('phase-summary').innerHTML = `
    <div class="phase-stat">
      <div class="ps-num" style="color:var(--cyan)">${done}/${all.length}</div>
      <div class="ps-label">Total Done</div>
    </div>
  `;
 
  SECTIONS.forEach(s => {
    const sKeys = [];
    s.groups.forEach(g => g.items.forEach(i => sKeys.push(itemKey(s.id, g.title, i))));
    const sDone = sKeys.filter(k => state[k]).length;
    const dot = document.querySelector(`[data-tab="${s.id}"] .tab-dot`);
    if (dot) dot.style.background = (sDone === sKeys.length && sKeys.length > 0) ? 'var(--cyan)' : '';
  });
}
 
function toggleItem(key, el) {
  state[key] = !state[key]; saveState();
  el.classList.toggle('done', state[key]);
  updateProgress();
}
 
function resetAll() {
  if (!confirm('Reset all items and clear notes?')) return;
  state = {}; notes = {}; saveState();
  document.querySelectorAll('.check-item.done').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.item-notes').forEach(el => el.value = '');
  updateProgress();
}
 
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.dataset.section === id));
}
 
// ── SEARCH ──────────────────────────────────────────────────────────────────
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, q) {
  return text.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}
 
function runSearch(query) {
  const q = query.trim().toLowerCase();
  const tabsNav = document.getElementById('tabs-nav');
  const label   = document.getElementById('search-results-label');
  const noRes   = document.getElementById('no-results');
  const clrBtn  = document.getElementById('search-clear');
 
  clrBtn.classList.toggle('visible', q.length > 0);
 
  if (!q) {
    tabsNav.classList.remove('search-active');
    label.classList.remove('visible');
    noRes.classList.remove('visible');
    document.querySelectorAll('.section').forEach(s => {
      s.classList.remove('search-active'); s.style.display = '';
    });
    document.querySelectorAll('.check-item').forEach(el => {
      el.classList.remove('search-hidden');
      const lbl = el.querySelector('.item-label');
      if (lbl && lbl.dataset.original) lbl.innerHTML = lbl.dataset.original;
    });
    document.querySelectorAll('.group-header').forEach(el => el.classList.remove('search-hidden'));
    const active = document.querySelector('.tab.active');
    switchTab(active ? active.dataset.tab : SECTIONS[0].id);
    return;
  }
 
  tabsNav.classList.add('search-active');
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active'); s.classList.add('search-active');
  });
 
  let total = 0;
  SECTIONS.forEach(s => {
    s.groups.forEach(g => {
      let gVis = 0;
      const gEl = document.querySelector(`[data-group="${s.id}||${g.title}"]`);
      document.querySelectorAll(`[data-group-items="${s.id}||${g.title}"] .check-item`).forEach(row => {
        const lbl = row.querySelector('.item-label');
        const orig = lbl.dataset.original || lbl.textContent;
        lbl.dataset.original = orig;
        if (orig.toLowerCase().includes(q)) {
          row.classList.remove('search-hidden');
          lbl.innerHTML = highlight(orig, query.trim());
          gVis++; total++;
        } else {
          row.classList.add('search-hidden');
          lbl.innerHTML = orig;
        }
      });
      if (gEl) gEl.classList.toggle('search-hidden', gVis === 0);
    });
  });
 
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = sec.querySelectorAll('.check-item:not(.search-hidden)').length > 0 ? 'block' : 'none';
  });
 
  label.textContent = `${total} result${total !== 1 ? 's' : ''} for "${query.trim()}"`;
  label.classList.add('visible');
  noRes.classList.toggle('visible', total === 0);
}
 
function initSearch() {
  const inp = document.getElementById('search-input');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input', e => runSearch(e.target.value));
  clr.addEventListener('click', () => { inp.value = ''; runSearch(''); inp.focus(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
}
 
// ── BUILD ────────────────────────────────────────────────────────────────────
function build() {
  loadState();
  const tabsNav = document.getElementById('tabs-nav');
  const wrap    = document.getElementById('sections-wrap');
 
  SECTIONS.forEach((s, si) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (si === 0 ? ' active' : '');
    tab.dataset.tab = s.id;
    tab.innerHTML = `<span class="tab-dot"></span>${s.label}`;
    tab.addEventListener('click', () => switchTab(s.id));
    tabsNav.appendChild(tab);
 
    const section = document.createElement('div');
    section.className = 'section' + (si === 0 ? ' active' : '');
    section.dataset.section = s.id;
 
    const secLbl = document.createElement('div');
    secLbl.className = 'section-search-label';
    secLbl.textContent = s.label;
    section.appendChild(secLbl);
 
    s.groups.forEach(g => {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.textContent = g.title;
      gh.dataset.group = `${s.id}||${g.title}`;
      section.appendChild(gh);
 
      const cl = document.createElement('div');
      cl.className = 'checklist';
      cl.dataset.groupItems = `${s.id}||${g.title}`;
 
      g.items.forEach(item => {
        const key = itemKey(s.id, g.title, item);
        const row = document.createElement('div');
        row.className = 'check-item' + (state[key] ? ' done' : '');
 
        const noteVal = notes[key] || '';
        const noteHtml = `<input type="text" class="item-notes" placeholder="Notes…" value="${noteVal.replace(/"/g,'&quot;')}">`;
 
        row.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 11 8">
              <path d="M1 4l3 3 6-6"/>
            </svg>
          </div>
          <div class="item-content">
            <span class="item-label">${item}</span>
            ${noteHtml}
          </div>
        `;
 
        row.addEventListener('click', e => {
          if (e.target.classList.contains('item-notes')) return;
          toggleItem(key, row);
        });
        row.querySelector('.item-notes').addEventListener('input', e => {
          notes[key] = e.target.value; saveState();
        });
 
        cl.appendChild(row);
      });
 
      section.appendChild(cl);
    });
 
    wrap.appendChild(section);
  });
 
  updateProgress();
  initSearch();
}
 
build();
</script>
</body>
</html>
